databaseChangeLog:
  - changeSet:
      id: 007
      author: Aleksei Podstavin
      changes:
        - createTable:
            tableName: review
            columns:
              - column:
                  name: id
                  type: long
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: rating
                  type: int
              - column:
                  name: comment
                  type: varchar(500)
              - column:
                  name: reviewer
                  type: varchar(50)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_reviewer
                    references: usr(email)
              - column:
                  name: movie_id
                  type: long
                  constraints:
                    nullable: false
                    foreignKeyName: fk_movie
                    references: movie(id)